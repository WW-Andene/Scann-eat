name: Build Android APK

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Bundle engine for browser
        run: npm run build:web

      - name: Scaffold Capacitor Android project
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Check for release signing secrets
        id: signing
        run: |
          if [[ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" && -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" && -n "${{ secrets.ANDROID_KEY_ALIAS }}" && -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        if: steps.signing.outputs.release == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Inject release signing config
        if: steps.signing.outputs.release == 'true'
        run: |
          cat >> android/app/build.gradle <<'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          EOF

      - name: Build debug APK
        if: steps.signing.outputs.release == 'false'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build signed release APK
        if: steps.signing.outputs.release == 'true'
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        if: steps.signing.outputs.release == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: scann-eat-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK
        if: steps.signing.outputs.release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scann-eat-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
