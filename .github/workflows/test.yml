name: Test + Build

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Node 22 minimum: `--experimental-strip-types` (the flag the
        # test runner relies on per ADR-0005) landed in Node 22.6.
        # Node 20 doesn't have it at all. 24 is the next LTS — pin
        # both so a regression on either fails fast.
        node-version: ['22', '24']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build web bundle
        run: npm run build:web

  audit-ruler:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run audit-ruler (warning-only)
        run: bash tools/audit-ruler.sh
