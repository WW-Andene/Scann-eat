# Fly.io config for Scann-eat.
# Change `app` to your own unique name, then:
#   fly launch --no-deploy       # creates the app (skip if already created)
#   fly secrets set GROQ_API_KEY=gsk_...
#   fly deploy

app = "scann-eat"
primary_region = "cdg"  # Paris; change to your nearest Fly region

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
